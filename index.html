<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; padding: 24px 16px; }
    h1 { text-align: center; font-size: 18px; font-weight: 500; color: #aaa; margin-bottom: 24px; letter-spacing: 0.05em; text-transform: uppercase; font-size: 13px; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 820px; margin: 0 auto; }
    @media (max-width: 640px) { .wrap { grid-template-columns: 1fr; } }
    .panel { background: #111; border: 0.5px solid #2a2a2a; border-radius: 14px; padding: 1.25rem; }
    .panel-title { font-size: 11px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
    .field { margin-bottom: 11px; }
    .field label { display: block; font-size: 12px; color: #777; margin-bottom: 4px; }
    .field input { width: 100%; background: #1a1a1a; border: 0.5px solid #2e2e2e; color: #fff; border-radius: 8px; padding: 9px 11px; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: #555; }
    .field input::placeholder { color: #3a3a3a; }
    .photo-upload-area { border: 1.5px dashed #2a2a2a; border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; margin-bottom: 14px; background: #1a1a1a; transition: border-color 0.15s; }
    .photo-upload-area:hover { border-color: #444; }
    .photo-upload-area.has-photo { border-style: solid; border-color: #333; }
    .photo-preview-thumb { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin: 0 auto 8px; display: block; border: 2px solid #333; }
    .upload-icon { width: 38px; height: 38px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
    .upload-label { font-size: 13px; color: #999; }
    .upload-sub { font-size: 11px; color: #444; margin-top: 3px; }
    .remove-btn { font-size: 11px; color: #555; cursor: pointer; margin-top: 6px; display: inline-block; }
    .remove-btn:hover { color: #aaa; }
    .card-preview { border-radius: 12px; background: #000; border: 0.5px solid #1e1e1e; padding: 1.5rem; color: #fff; min-height: 210px; position: relative; overflow: hidden; }
    .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #fff 0%, #444 100%); }
    .card-avatar { width: 54px; height: 54px; border-radius: 50%; border: 1.5px solid #333; overflow: hidden; margin-bottom: 12px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .card-avatar span { font-size: 20px; font-weight: 500; color: #555; }
    .card-name { font-size: 18px; font-weight: 500; color: #fff; margin-bottom: 3px; }
    .card-job { font-size: 12px; color: #555; margin-bottom: 14px; }
    .card-divider { border: none; border-top: 0.5px solid #1e1e1e; margin-bottom: 12px; }
    .card-details { display: flex; flex-direction: column; gap: 7px; }
    .card-detail { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
    .card-icon { width: 14px; height: 14px; flex-shrink: 0; color: #444; }
    .qr-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .qr-box { background: #fff; border-radius: 8px; padding: 10px; display: inline-block; }
    .qr-note { font-size: 12px; color: #444; text-align: center; }
    .gen-btn { width: 100%; margin-top: 10px; background: #fff; color: #000; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .gen-btn:hover { background: #ddd; }
    #file-input { display: none; }
    .right-col { display: flex; flex-direction: column; gap: 16px; }
    footer { text-align: center; margin-top: 32px; font-size: 11px; color: #333; }
  </style>
</head>
<body>
  <h1>Digital Business Card</h1>
  <div class="wrap">
    <!-- LEFT: Form -->
    <div class="panel">
      <p class="panel-title">Profile photo</p>
      <div class="photo-upload-area" id="uploadArea" onclick="document.getElementById('file-input').click()">
        <div id="uploadEmpty">
          <div class="upload-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <div class="upload-label">Click to upload photo</div>
          <div class="upload-sub">JPG, PNG, GIF up to 5MB</div>
        </div>
        <div id="uploadPreview" style="display:none">
          <img id="thumbImg" class="photo-preview-thumb" src="" alt="preview">
          <div class="upload-label">Photo uploaded</div>
          <span class="remove-btn" onclick="removePhoto(event)">Remove</span>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handlePhoto(this)">

      <p class="panel-title" style="margin-top:6px">Your info</p>
      <div class="field"><label>Full name</label><input type="text" id="f-name" placeholder="Jane Smith" oninput="updateCard()"></div>
      <div class="field"><label>Job title</label><input type="text" id="f-title" placeholder="Creative Director" oninput="updateCard()"></div>
      <div class="field"><label>Phone number</label><input type="tel" id="f-phone" placeholder="+1 (555) 000-0000" oninput="updateCard()"></div>
      <div class="field"><label>Instagram</label><input type="text" id="f-ig" placeholder="@yourhandle" oninput="updateCard()"></div>
      <div class="field"><label>TikTok</label><input type="text" id="f-tt" placeholder="@yourhandle" oninput="updateCard()"></div>
      <button class="gen-btn" onclick="generateQR()">Generate QR code</button>
    </div>

    <!-- RIGHT: Preview + QR -->
    <div class="right-col">
      <div class="panel">
        <p class="panel-title">Preview</p>
        <div class="card-preview">
          <div class="card-accent"></div>
          <div class="card-avatar" id="previewAvatar">
            <span id="previewAvatarText">?</span>
          </div>
          <div class="card-name" id="previewName">Your Name</div>
          <div class="card-job" id="previewTitle">Job Title</div>
          <hr class="card-divider">
          <div class="card-details">
            <div class="card-detail" id="row-phone" style="display:none">
              <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.29 6.29l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
              <span id="previewPhone"></span>
            </div>
            <div class="card-detail" id="row-ig" style="display:none">
              <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
              <span id="previewIG"></span>
            </div>
            <div class="card-detail" id="row-tt" style="display:none">
              <svg class="card-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.89a8.27 8.27 0 004.84 1.55V7a4.85 4.85 0 01-1.07-.31z"/></svg>
              <span id="previewTT"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <p class="panel-title">QR code</p>
        <div class="qr-section">
          <div class="qr-box">
                          <canvas id="qrCanvas" width="150" height="150"></canvas>
          </div>
          <p class="qr-note" id="qrNote">Fill in your info and generate</p>
        </div>
      </div>
    </div>
  </div>

  <footer>Digital Business Card Builder</footer>

  <script>
    let photoDataURL = null;

    function handlePhoto(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        photoDataURL = e.target.result;
        document.getElementById('thumbImg').src = photoDataURL;
        document.getElementById('uploadEmpty').style.display = 'none';
        document.getElementById('uploadPreview').style.display = 'block';
        document.getElementById('uploadArea').classList.add('has-photo');
        const pAvatar = document.getElementById('previewAvatar');
        pAvatar.innerHTML = '<img src="' + photoDataURL + '" style="width:100%;height:100%;object-fit:cover;">';
      };
      reader.readAsDataURL(file);
    }

    function removePhoto(e) {
      e.stopPropagation();
      photoDataURL = null;
      document.getElementById('uploadEmpty').style.display = 'block';
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadArea').classList.remove('has-photo');
      document.getElementById('file-input').value = '';
      const name = document.getElementById('f-name').value.trim();
      const initials = name ? name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : '?';
      document.getElementById('previewAvatar').innerHTML = '<span id="previewAvatarText">' + initials + '</span>';
    }

    function updateCard() {
      const name = document.getElementById('f-name').value.trim();
      const title = document.getElementById('f-title').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const ig = document.getElementById('f-ig').value.trim();
      const tt = document.getElementById('f-tt').value.trim();
      document.getElementById('previewName').textContent = name || 'Your Name';
      document.getElementById('previewTitle').textContent = title || 'Job Title';
      if (!photoDataURL) {
        const initials = name ? name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : '?';
        document.getElementById('previewAvatar').innerHTML = '<span id="previewAvatarText">' + initials + '</span>';
      }
      const setRow = (rowId, spanId, val) => {
        document.getElementById(rowId).style.display = val ? 'flex' : 'none';
        document.getElementById(spanId).textContent = val;
      };
      setRow('row-phone', 'previewPhone', phone);
      setRow('row-ig', 'previewIG', ig ? (ig.startsWith('@') ? ig : '@' + ig) : '');
      setRow('row-tt', 'previewTT', tt ? (tt.startsWith('@') ? tt : '@' + tt) : '');
    }

    function generateQR() {
      const name = document.getElementById('f-name').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const ig = document.getElementById('f-ig').value.trim();
      const tt = document.getElementById('f-tt').value.trim();
      const title = document.getElementById('f-title').value.trim();

      if (!name && !phone && !ig && !tt) {
        document.getElementById('qrNote').textContent = 'Please fill in at least one field first.';
        return;
      }

      // Build a vCard so phones can save contact directly
      let vcard = 'BEGIN:VCARD\nVERSION:3.0\n';
      if (name) vcard += 'FN:' + name + '\n';
      if (title) vcard += 'TITLE:' + title + '\n';
      if (phone) vcard += 'TEL:' + phone + '\n';
      if (ig) vcard += 'X-SOCIALPROFILE;type=instagram:' + (ig.startsWith('@') ? ig : '@' + ig) + '\n';
      if (tt) vcard += 'X-SOCIALPROFILE;type=tiktok:' + (tt.startsWith('@') ? tt : '@' + tt) + '\n';
      vcard += 'END:VCARD';

      const canvas = document.getElementById('qrCanvas');
      QRCode.toCanvas(canvas, vcard, {
        width: 150,
        margin: 1,
        color: { dark: '#000000', light: '#ffffff' }
      }, err => {
        if (err) {
          document.getElementById('qrNote').textContent = 'Error generating QR. Try again.';
          console.error(err);
        } else {
          document.getElementById('qrNote').textContent = 'Scan to save contact info';
        }
      });
    }
  </script>
</body>
</html>
